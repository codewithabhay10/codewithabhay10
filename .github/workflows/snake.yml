# Generates the contribution-snake SVG and pushes it to the "output" branch.
# README references it from the output branch, so it animates on your profile.
name: Generate Snake Animation

on:
  schedule:
    # Re-generate every 12 hours so the snake stays current.
    - cron: "0 */12 * * *"
  # Lets you run it manually from the Actions tab.
  workflow_dispatch:
  # Re-generate on every push to main.
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
